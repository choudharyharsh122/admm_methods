[admm_config]
ITER_MAX = 30 # maximum number of ADMM iterations
RHO = 10 # initial penalty parameter
INFEAS_TOL = 1e-1 # stopping criterion for ADMM

[general_config]
SEED_INIT = 25 # random seed for initialization (used with mergesplit backend)
USE_PREV = false # keep for compatibility

[problem_config]
SOURCE_STRENGTH = 1
VOL_FRAC = 0.4
MESH_SIZE = 16
ALPHA = 1e-2

[penalty_parameter_config]
PENALTY_UPDATE_METHOD = none  # (none, periodic, running_avg)
RHO_INCREASE_FACTOR = 1.25
STAG_WINDOW = 3
DECREASE_EPS = 1e-12
SLOW_THRESH = 0.5
STAG_THRESH = 0.1

[subproblem_2_config]
USE_MIP = false # (true, false)
BACKEND = gurobi # (gurobi, mergesplit, chambolle-pock)
CUTOFF_TIME = 300.0 # seconds, Gurobi time limit for subproblem 2
